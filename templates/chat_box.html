<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with {{ user_details.name }} - HandyPro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
       body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgba(244, 247, 250, 0.8), rgba(195, 207, 226, 0.8)),
                        url('https://img.freepik.com/free-vector/chat-concept-illustration_114360-129.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 90%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            height: 85vh;
        }

        /* Header Styles */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #007bff;
            color: white;
            border-radius: 20px 20px 0 0;
        }

        .chat-header img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-right: 15px;
            border: 2px solid white;
        }

        .chat-header h3 {
            margin: 0;
            font-size: 22px;
        }

        .chat-header p {
            margin: 3px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .offer-btn {
            padding: 8px 15px;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .offer-btn:hover {
            background: #e68900;
        }

        /* Messages Section */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f9f9f9;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 12px 18px;
            border-radius: 15px;
            max-width: 70%;
            word-wrap: break-word;
            font-size: 15px;
            position: relative;
        }

        .sender {
            background: #007bff;
            color: white;
            align-self: flex-end;
        }

        .receiver {
            background: #e0e0e0;
            color: #333;
            align-self: flex-start;
        }

        .offer {
            background: #ffeb3b;
            color: #333;
            font-weight: bold;
            border: 2px dashed #ff9800;
        }

        .message::after {
            content: attr(data-time);
            display: block;
            font-size: 12px;
            margin-top: 5px;
            text-align: right;
        }

        .sender::after { color: rgba(255, 255, 255, 0.7); }
        .receiver::after { color: rgba(0, 0, 0, 0.5); }

        /* Input and Send Button */
        .message-form {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
            background: #fff;
        }

        .message-form input {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-size: 16px;
            margin-right: 10px;
        }

        .message-form button {
            padding: 12px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .message-form button i {
            margin-left: 5px;
        }

        .message-form button:hover {
            background: #0056b3;
        }

        /* Modal (Dialog Box) Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .modal-content h3 {
            margin-bottom: 15px;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        .modal-content .btn-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 15px;
        }

        .modal-content .btn-group button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .modal-content .send-offer {
            background: #4caf50;
            color: white;
        }

        .modal-content .cancel {
            background: #f44336;
            color: white;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Chat Header with Receiver Details -->
        <div class="chat-header">
            <div style="display: flex; align-items: center;">
                <img src="{{ user_details.image_url or 'https://img.freepik.com/free-vector/contact-icon-3d-vector-illustration-blue-button-with-user-profile-symbol-networking-sites-apps-cartoon-style-isolated-white-background-online-communication-digital-marketing-concept_778687-1715.jpg' }}" alt="User Image">
                <div>
                    <h3>{{ user_details.name }}</h3>
                    <p><i class="fas fa-envelope"></i> {{ user_details.email }}</p>
                </div>
            </div>
            <button class="offer-btn" onclick="openOfferModal()">Create Offer</button>
        </div>

        <!-- Messages Section -->
        <div class="messages" id="messages">
            {% for msg in messages %}
                <div class="message {{ 'sender' if msg.sender == session['parent_id'] else 'receiver' }} {{ 'offer' if msg.is_offer else '' }}" data-time="{{ msg.timestamp }}">
                    {{ msg.message }}
                </div>
            {% endfor %}
        </div>

        <!-- Message Form -->
        <form method="POST" class="message-form">
            <input type="text" name="message" placeholder="Type your message..." required>
            <button type="submit">
                Send <i class="fas fa-paper-plane"></i>
            </button>
        </form>
    </div>

    <!-- Offer Modal -->
    <div class="modal" id="offerModal">
        <div class="modal-content">
            <h3>Create an Offer</h3>
            <input type="number" id="hours" placeholder="Enter Hours" required>
            <input type="number" id="rate" placeholder="Enter Rate per Hour" required>
            <div class="btn-group">
                <button class="send-offer" onclick="sendOffer()">Send Offer</button>
                <button class="cancel" onclick="closeOfferModal()">Cancel</button>
            </div>
        </div>
    </div>
<!-- Hidden Offer Form -->
<form method="POST" id="offerForm" style="display:none;">
    <input type="hidden" name="offer_message" id="offer_message">
</form>
    <!-- Auto-scroll to latest message -->
    <script>
        const messageContainer = document.getElementById('messages');
        messageContainer.scrollTop = messageContainer.scrollHeight;

        // Open Modal
        function openOfferModal() {
            document.getElementById('offerModal').style.display = 'flex';
        }

        // Close Modal
        function closeOfferModal() {
            document.getElementById('offerModal').style.display = 'none';
        }
// Send Offer Function
function sendOffer() {
    const hours = document.getElementById('hours').value;
    const rate = document.getElementById('rate').value;

    if (hours && rate) {
        const totalAmount = hours * rate;
        const offerMessage = `Offer: ${hours} hours @ $${rate}/hour\nTotal Amount: $${totalAmount}`;

        // Set the offer message in the hidden input and submit the form
        document.getElementById('offer_message').value = offerMessage;
        document.getElementById('offerForm').submit();

        closeOfferModal();
    } else {
        alert('Please fill in all fields.');
    }
}
    </script>
</body>
</html>
